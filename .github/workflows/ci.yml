name: CI

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shell-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Bash syntax
        run: |
          bash -n sing-box-deve.sh lib/*.sh providers/*.sh scripts/*.sh container/nodejs/start.sh

      - name: JavaScript syntax
        run: |
          node --check container/nodejs/index.js
          node --check web-generator/app.js

      - name: Enforce max 400 lines per shell file
        run: |
          bash scripts/test-module-size.sh

      - name: Shellcheck
        run: |
          shellcheck sing-box-deve.sh lib/*.sh providers/*.sh scripts/*.sh container/nodejs/start.sh

      - name: JSON examples validation
        run: |
          node -e "const fs=require('fs'); JSON.parse(fs.readFileSync('examples/serv00-accounts.json','utf8')); JSON.parse(fs.readFileSync('examples/sap-accounts.json','utf8'));"

      - name: Clash ruleset generation checks
        run: |
          bash scripts/test-clash-ruleset.sh

      - name: Version comparison checks
        run: |
          bash scripts/test-version-compare.sh

      - name: Update authority checks
        run: |
          bash scripts/test-update-authority.sh

      - name: Non-root dry-run
        run: |
          HOME="$RUNNER_TEMP/sbd-home" ./sing-box-deve.sh install --dry-run --provider vps --profile lite --engine sing-box --protocols vless-reality --uuid 11111111-1111-4111-8111-111111111111 --yes

      - name: Verify checksums manifest
        run: |
          ./scripts/update-checksums.sh
          git diff --exit-code checksums.txt
